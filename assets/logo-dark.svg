<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 56" width="224" height="56" role="img" aria-label="Project Team Wear">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=IBM+Plex+Mono&amp;display=swap');
      .ptw-mark { font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif; }
      .ptw-word { font-family: 'Bebas Neue', Impact, 'Arial Narrow', sans-serif; }
      .ptw-sub  { font-family: 'IBM Plex Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Icon: solid orange block -->
  <rect x="0" y="0" width="60" height="56" rx="3" fill="#FF3A00"/>

  <!-- PTW inside the block -->
  <text x="30" y="42"
    class="ptw-mark"
    text-anchor="middle"
    font-size="34"
    letter-spacing="1"
    fill="#080808">PTW</text>

  <!-- Vertical divider -->
  <line x1="76" y1="8" x2="76" y2="48" stroke="rgba(240,237,232,0.18)" stroke-width="1"/>

  <!-- Stacked wordmark -->
  <text x="88" y="26"
    class="ptw-word"
    font-size="19"
    letter-spacing="5"
    fill="#F0EDE8">PROJECT</text>

  <text x="88" y="46"
    class="ptw-word"
    font-size="19"
    letter-spacing="3"
    fill="#F0EDE8">TEAM WEAR</text>

  <!-- Orange underline accent on TEAM WEAR -->
  <rect x="88" y="49" width="136" height="2" rx="1" fill="#FF3A00"/>
</svg>
