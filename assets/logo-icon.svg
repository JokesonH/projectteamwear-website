<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="PTW">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
    </style>
  </defs>

  <!-- Dark background -->
  <rect x="0" y="0" width="100" height="100" rx="12" fill="#080808"/>

  <!-- Orange block centred -->
  <rect x="12" y="12" width="76" height="76" rx="6" fill="#FF3A00"/>

  <!-- PTW centred -->
  <text x="50" y="72"
    font-family="'Bebas Neue', Impact, 'Arial Narrow', sans-serif"
    text-anchor="middle"
    font-size="46"
    letter-spacing="2"
    fill="#080808">PTW</text>
</svg>
